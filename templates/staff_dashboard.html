{% extends 'base.html' %}

{% block title %}Staff Dashboard{% endblock %}

{% block content %}

<h2 class="mb-4">Welcome Staff 👨‍💼</h2>

<!-- QUICK ACTIONS -->
<div class="row mb-4">

    <div class="col-md-4">
        <div class="card shadow text-center p-3">
            <i class="bi bi-cash display-5 text-success"></i>
            <h5 class="mt-2">Sales</h5>
            <a href="/create_sale/" class="btn btn-success btn-sm">Start Sale</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center p-3">
            <i class="bi bi-person-plus display-5 text-primary"></i>
            <h5 class="mt-2">Add Customer</h5>
            <a href="/add_customer/" class="btn btn-primary btn-sm">Add</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center p-3">
            <i class="bi bi-people display-5 text-warning"></i>
            <h5 class="mt-2">Customers</h5>
            <a href="/customer_list/" class="btn btn-warning btn-sm">View</a>
        </div>
    </div>

</div>

<!-- SALES TABLE -->
<!-- SALES TABLE -->
<div class="card shadow p-3">

    <h4 class="mb-3">Recent Sales</h4>

    <!-- FILTER -->
    <form id="searchForm" class="row g-2 mb-3">

        <div class="col-md-4">
            <input type="text" id="searchInput" class="form-control"
                   placeholder="Search medicine or customer">
        </div>

        <div class="col-md-3">
            <input type="date" id="dateFrom" class="form-control">
        </div>

        <div class="col-md-3">
            <input type="date" id="dateTo" class="form-control">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Filter</button>
        </div>

    </form>

    <!-- 🔥 ONLY ONE DYNAMIC CONTAINER -->
    <div id="tableContainer">
        {% include 'partials/sale_table.html' %}
    </div>

</div>
<script>
document.addEventListener("DOMContentLoaded", function(){

    const searchInput = document.getElementById("searchInput");
    const dateFrom = document.getElementById("dateFrom");
    const dateTo = document.getElementById("dateTo");
    const tableContainer = document.getElementById("tableContainer");

    function fetchData() {

        let search = searchInput.value;
        let from = dateFrom.value;
        let to = dateTo.value;

        fetch(`/staff_dashboard/?search=${search}&date_from=${from}&date_to=${to}`, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(data => {
            tableContainer.innerHTML = data.html;
        });
    }

    // 🔥 LIVE SEARCH (typing)
    searchInput.addEventListener("keyup", fetchData);

    // 📅 date change
    dateFrom.addEventListener("change", fetchData);
    dateTo.addEventListener("change", fetchData);

});
</script>
{% endblock %}
