{% extends 'base.html' %}

{% block title %}Add Purchase{% endblock %}

{% block content %}

<div class="card shadow p-4">

<h3 class="mb-3">Add Purchase</h3>

<form method="POST">
    {% csrf_token %}

    <div class="row">

        <!-- New Medicine -->
        <div class="col-md-6 mb-3">
            <label class="form-label">New Medicine (optional)</label>
            <input type="text" class="form-control" name="medicine_name" placeholder="Enter new medicine">
        </div>

        <!-- Select Medicine -->
        <div class="col-md-6 mb-3">
            <label class="form-label">Select Medicine</label>
            <select class="form-select" name="medicine_id" id="medicineSelect">
                <option value="">-- Select Medicine --</option>
                {% for m in medicines %}
                <option value="{{ m.id }}">
                    {{ m.name }} | Stock: {{ m.quantity }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Quantity -->
        <div class="col-md-4 mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" name="quantity" id="qty">
        </div>

        <!-- Price -->
        <div class="col-md-4 mb-3">
            <label class="form-label">Price</label>
            <input type="number" class="form-control" step="0.01" name="price" id="price">
        </div>

        <!-- Expiry -->
        <div class="col-md-4 mb-3">
            <label class="form-label">Expiry Date</label>
            <input type="date" class="form-control" name="expiry_date" id="expiry">
        </div>

        <!-- Supplier -->
        <div class="col-md-6 mb-3">
            <label class="form-label">Supplier</label>
            <select class="form-select" name="supplier">
                <option value="">-- Select Supplier --</option>
                {% for s in suppliers %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Payment Method -->
        <div class="col-md-3 mb-3">
            <label class="form-label">Payment Method</label>
            <select class="form-select" name="payment_method">
                <option value="cash">Cash</option>
                <option value="card">Card</option>
                <option value="online">Online</option>
            </select>
        </div>

        <!-- Payment Status -->
        <div class="col-md-3 mb-3">
            <label class="form-label">Payment Status</label>
            <select class="form-select" name="payment_status">
                <option value="paid">Paid</option>
                <option value="pending">Pending</option>
            </select>
        </div>

    </div>

    <!-- Add More Button -->
    <button type="button" class="btn btn-primary mb-3" onclick="addToCart()">
        + Add More
    </button>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-bordered" id="addTable">
            <thead class="table-primary">
                <tr>
                    <th>Medicine</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Expiry Date</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="hiddenInputs"></div>

    <button type="submit" class="btn btn-success">
        Add Purchase
    </button>

    {% if error %}
        <p class="text-danger mt-2">{{ error }}</p>
    {% endif %}

</form>

</div>

<script>
function addToCart() {
    let medicineSelect = document.getElementById('medicineSelect');
    let qty = document.getElementById('qty').value;
    let price = document.getElementById('price').value;
    let expiry = document.getElementById('expiry').value;

    if (!qty || qty <= 0) {
        alert("Enter valid quantity");
        return;
    }

    let medId = medicineSelect.value;
    let medText = medicineSelect.options[medicineSelect.selectedIndex].text;

    let table = document.querySelector("#addTable tbody");
    let row = table.insertRow();

    row.innerHTML = `
        <td>${medText}</td>
        <td>${qty}</td>
        <td>${price}</td>
        <td>${expiry}</td>
    `;

    document.getElementById('hiddenInputs').innerHTML += `
        <input type="hidden" name="medicine_id" value="${medId}">
        <input type="hidden" name="quantity" value="${qty}">
        <input type="hidden" name="price" value="${price}">
        <input type="hidden" name="expiry_date" value="${expiry}">
    `;
}
</script>

{% endblock %}
