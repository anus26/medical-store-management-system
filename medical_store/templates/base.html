<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #0d6efd;
            padding: 20px;
            color: white;
        }
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }
        .content {
            margin-left: 240px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- Sidebar (COMMON FOR ALL PAGES) -->
<div class="sidebar">
    <h4><i class="bi bi-speedometer2"></i> Admin</h4>
    <hr>

    <a href="/"><i class="bi bi-house"></i> Dashboard</a>
    <a href="/add_medicine/"><i class="bi bi-capsule"></i> Add Medicine</a>
    <a href="/create_purchase/"><i class="bi bi-cart"></i> Purchase</a>
    <a href="/supplier/"><i class="bi bi-truck"></i> Supplier</a>

    <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn btn-danger w-100 mt-3">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </form>
</div>

<!-- Page Content -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
